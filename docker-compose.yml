version: '3.8'

services:
  gateway:
    build:
      context: ./backend/gateway
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - ai-service

  ai-service:
    build:
      context: ./backend/ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    depends_on:
      - gateway

volumes:
  data:
